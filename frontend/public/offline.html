<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — PropLedger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1729;
      color: #e2e8f0;
      text-align: center;
      padding: 2rem;
    }
    img { width: 80px; margin-bottom: 1.5rem; border-radius: 16px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    p  { font-size: 0.95rem; color: #94a3b8; max-width: 300px; line-height: 1.6; }
    button {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #1a5490;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <img src="/icon-192x192.png" alt="PropLedger" />
  <h1>You're offline</h1>
  <p>PropLedger needs a connection to load your deals and payments. Please check your internet and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
